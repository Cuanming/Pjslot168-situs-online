<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://imgur.com/7NCZB9g.jpeg" rel="shortcut icon" type="image/x-icon" />
  <title>Anda Sedang Dialihkan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="redirect.js" defer></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Stars background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    /* Ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse 5s ease-in-out infinite;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: rgba(139, 92, 246, 0.12);
      top: -150px;
      left: -100px;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: rgba(59, 130, 246, 0.10);
      bottom: -100px;
      right: -80px;
      animation-delay: 2.5s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    /* Main content */
    .loading {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo spinner */
    .logo-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: #8b5cf6;
      border-right-color: #3b82f6;
      animation: spin 1.5s linear infinite;
    }

    .logo-ring::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo-inner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
    }

    /* Title */
    .title-group {
      text-align: center;
    }

    .title-main {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1px;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .title-main .accent {
      background: linear-gradient(90deg, #8b5cf6, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title-sub {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Progress bar */
    .progress-wrap {
      width: 220px;
      height: 3px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, #8b5cf6, #3b82f6, #8b5cf6);
      background-size: 200% 100%;
      border-radius: 99px;
      animation: slide 1.8s ease-in-out infinite, shimmer 2s linear infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-250px); }
      100% { transform: translateX(550px); }
    }

    @keyframes shimmer {
      0%   { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    /* Dots */
    .dots {
      display: flex;
      gap: 7px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { background: #8b5cf6; animation-delay: 0s; }
    .dot:nth-child(2) { background: #6366f1; animation-delay: 0.2s; }
    .dot:nth-child(3) { background: #3b82f6; animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.75); opacity: 0.4; }
      40% { transform: scale(1.25); opacity: 1; }
    }

    /* Redirecting label */
    .redirect-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: -16px;
    }

    /* Dribbble link (keep from original) */
    .dribbble {
      position: fixed;
      bottom: 20px;
      right: 20px;
      opacity: 0.25;
      transition: opacity 0.2s;
    }
    .dribbble:hover { opacity: 0.5; }
    .dribbble img { width: 28px; height: 28px; }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="loading">
    <div class="logo-ring">
      <div class="logo-inner">🔥</div>
    </div>

    <div class="title-group">
      <div class="title-main">Anda Sedang Dialihkan ke</div>
      <div class="title-main"><span class="accent">Situs Paling Gacor</span></div>
      <div class="title-sub">Mohon tunggu sebentar...</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="redirect-label">Redirecting...</div>
  </div>

  <a class="dribbble" href="https://dribbble.com/shots/6616259-Loading-text-animation" target="_blank">
    <img src="https://cdn.dribbble.com/assets/dribbble-ball-mark-2bd45f09c2fb58dbbfb44766d5d1d07c5a12972d602ef8b32204d28fa3dda554.svg" alt="Dribbble">
  </a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script>
    // Generate twinkling stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.opacity = Math.random() * 0.4 + 0.1;
      s.style.width = s.style.height = (Math.random() > 0.7 ? '3px' : '2px');
      starsEl.appendChild(s);
    }
  </script>
  <script src="./script.js"></script>
</body>
</html>
